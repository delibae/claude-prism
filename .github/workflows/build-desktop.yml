name: Build Desktop

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-vcpkg-cache:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-win-static-release-harfbuzz-fontconfig-freetype-icu-v1
          save-always: true

      - name: Cache status
        shell: bash
        run: |
          echo "Cache hit: ${{ steps.vcpkg-cache.outputs.cache-hit }}"
          ls -la "$VCPKG_INSTALLATION_ROOT/installed/" 2>/dev/null || echo "No installed dir yet"

      - name: Install Windows dependencies (vcpkg)
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          VCPKG_BINARY_SOURCES: "clear"
        run: |
          echo "::group::vcpkg install"
          vcpkg install "harfbuzz[graphite2]:x64-windows-static-release" \
            fontconfig:x64-windows-static-release \
            freetype:x64-windows-static-release \
            icu:x64-windows-static-release
          echo "::endgroup::"

      - name: Verify installed packages
        shell: bash
        run: |
          echo "Installed directory contents:"
          ls -la "$VCPKG_INSTALLATION_ROOT/installed/" || echo "Empty"
          echo "---"
          du -sh "$VCPKG_INSTALLATION_ROOT/installed/" 2>/dev/null || echo "No size info"
